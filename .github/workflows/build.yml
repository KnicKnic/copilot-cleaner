name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64
          - os: macos-latest
            rid: osx-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore CopilotCleaner.csproj

      - name: Build
        run: dotnet build CopilotCleaner.csproj --configuration Release --no-restore

      - name: Publish smoke artifact
        run: >-
          dotnet publish CopilotCleaner.csproj
          --configuration Release
          --runtime ${{ matrix.rid }}
          --self-contained false
          --output artifacts/CopilotCleaner-${{ matrix.rid }}
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: CopilotCleaner-${{ matrix.rid }}-framework-dependent
          path: artifacts/CopilotCleaner-${{ matrix.rid }}/
