name: Release

on:
  push:
    tags: [v*]
  workflow_dispatch:
    inputs:
      create_release:
        description: Create a GitHub Release
        type: boolean
        default: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    name: Publish ${{ matrix.rid }}
    runs-on: windows-latest
    strategy:
      matrix:
        rid: [win-x64, win-arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish app
        run: >-
          dotnet publish CopilotCleaner.csproj
          --configuration Release
          --runtime ${{ matrix.rid }}
          --self-contained true
          --output artifacts/CopilotCleaner-${{ matrix.rid }}
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true

      - name: Create archive
        shell: pwsh
        run: |
          $artifactName = 'CopilotCleaner-${{ matrix.rid }}.zip'
          Compress-Archive -Path 'artifacts/CopilotCleaner-${{ matrix.rid }}/*' -DestinationPath $artifactName -Force

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: CopilotCleaner-${{ matrix.rid }}
          path: CopilotCleaner-${{ matrix.rid }}.zip

  release:
    name: Create GitHub release
    needs: publish
    if: startsWith(github.ref, 'refs/tags/v') || inputs.create_release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=dev-$(date +%Y%m%d)" >> "$GITHUB_OUTPUT"
            echo "version=dev-$(date +%Y%m%d)" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Copilot Cleaner ${{ steps.version.outputs.version }}
          draft: false
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
          generate_release_notes: true
          files: artifacts/CopilotCleaner-*.zip